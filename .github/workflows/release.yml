name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (arm64 + x64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: yarn

      - name: Use HTTPS for github.com git deps
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - run: yarn install

      - run: yarn make --platform=darwin --arch=arm64,x64

      - name: Upload macOS arm64 DMG
        uses: actions/upload-artifact@v7
        with:
          name: Legacy-Scrobbler-macOS-arm64
          path: out/make/*-arm64.dmg
          if-no-files-found: error

      - name: Upload macOS x64 DMG
        uses: actions/upload-artifact@v7
        with:
          name: Legacy-Scrobbler-macOS-x64
          path: out/make/*-x64.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows (ia32 + x64)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: yarn

      - name: Use HTTPS for github.com git deps
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - run: yarn install

      - name: Build x64 installer
        run: yarn make --platform=win32 --arch=x64

      - name: Build ia32 installer
        run: yarn make --platform=win32 --arch=ia32

      - name: Upload Windows x64 installer
        uses: actions/upload-artifact@v7
        with:
          name: Legacy-Scrobbler-Windows-x64
          path: out/make/**/*-setup-x64.exe
          if-no-files-found: error

      - name: Upload Windows ia32 installer
        uses: actions/upload-artifact@v7
        with:
          name: Legacy-Scrobbler-Windows-ia32
          path: out/make/**/*-setup-ia32.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: yarn

      - name: Use HTTPS for github.com git deps
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - run: yarn install

      - run: yarn make --platform=linux --arch=x64

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v7
        with:
          name: Legacy-Scrobbler-Linux-AppImage-x64
          path: out/make/**/*.AppImage
          if-no-files-found: error

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v7
        with:
          name: Legacy-Scrobbler-Linux-deb-x64
          path: out/make/**/*.deb
          if-no-files-found: error

  attach-to-release:
    name: Attach binaries to GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Compute version (strip leading v)
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
          fail_on_unmatched_files: true
          body: |
            # MacOs
            [Apple Silicon (arm64) ${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Legacy.Scrobbler-${{ steps.version.outputs.value }}-arm64.dmg)
            [Apple Intel (x64) ${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Legacy.Scrobbler-${{ steps.version.outputs.value }}-x64.dmg)

            **macOS Users**: If you see a warning that the app is damaged and can't be opened, run this command in Terminal after installation:
            ```bash
            xattr -cr "/Applications/Legacy Scrobbler.app"
            ```


            # Windows
            [Windows (64-Bit) ${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Legacy.Scrobbler-${{ steps.version.outputs.value }}-setup-x64.exe)
            [Windows (32-Bit) ${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Legacy.Scrobbler-${{ steps.version.outputs.value }}-setup-ia32.exe)


            # Linux
            [AppImage (x64) ${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Legacy.Scrobbler-${{ steps.version.outputs.value }}-x64.AppImage)
            [Debian (.deb, x64) ${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/legacy-scrobbler_${{ steps.version.outputs.value }}_amd64.deb)
