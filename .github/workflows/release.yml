name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (arm64 + x64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Use HTTPS for github.com git deps
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - run: yarn install

      - run: yarn make --platform=darwin --arch=arm64,x64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmgs
          path: out/make/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows (ia32 + x64)
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Use HTTPS for github.com git deps
        run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"

      - run: yarn install

      - name: Build x64 installer
        run: yarn make --platform=win32 --arch=x64

      - name: Build ia32 installer
        run: yarn make --platform=win32 --arch=ia32

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: out/make/squirrel.windows/**/*.exe
          if-no-files-found: error

  attach-to-release:
    name: Attach binaries to GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-dmgs/*.dmg
            artifacts/windows-installers/**/*.exe
          fail_on_unmatched_files: true
